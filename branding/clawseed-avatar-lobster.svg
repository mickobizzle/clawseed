<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6A3D"/>
      <stop offset="100%" stop-color="#FF3D77"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7A1E1E" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Lobster body -->
  <g filter="url(#shadow)">
    <ellipse cx="512" cy="560" rx="190" ry="230" fill="#FFD7C2"/>
    <ellipse cx="512" cy="465" rx="130" ry="120" fill="#FFF1EA"/>

    <!-- Eyes -->
    <circle cx="455" cy="420" r="24" fill="#1C1C2A"/>
    <circle cx="569" cy="420" r="24" fill="#1C1C2A"/>
    <circle cx="448" cy="413" r="8" fill="#ffffff"/>
    <circle cx="562" cy="413" r="8" fill="#ffffff"/>

    <!-- Smile -->
    <path d="M435 500 Q512 565 589 500" stroke="#1C1C2A" stroke-width="16" fill="none" stroke-linecap="round"/>

    <!-- Antennae -->
    <path d="M470 360 C430 270 350 250 300 200" stroke="#FFD7C2" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M554 360 C594 270 674 250 724 200" stroke="#FFD7C2" stroke-width="14" fill="none" stroke-linecap="round"/>
    <circle cx="292" cy="196" r="12" fill="#FFF1EA"/>
    <circle cx="732" cy="196" r="12" fill="#FFF1EA"/>

    <!-- Claws -->
    <g>
      <ellipse cx="312" cy="560" rx="78" ry="62" fill="#FFE8DC"/>
      <ellipse cx="712" cy="560" rx="78" ry="62" fill="#FFE8DC"/>
      <path d="M260 530 Q220 500 250 460 Q292 470 300 515" fill="#FFF4EF"/>
      <path d="M764 530 Q804 500 774 460 Q732 470 724 515" fill="#FFF4EF"/>
    </g>

    <!-- Seed sprout motif -->
    <g transform="translate(512 660)">
      <ellipse cx="0" cy="0" rx="42" ry="30" fill="#1C1C2A"/>
      <path d="M0 -8 C-35 -46 -10 -74 10 -92 C30 -74 55 -46 20 -8" fill="#4DE39A"/>
      <path d="M-2 -5 C-22 -34 -8 -54 2 -66 C12 -54 26 -34 8 -5" fill="#9EF5C8"/>
    </g>
  </g>
</svg>
